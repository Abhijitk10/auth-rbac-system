# ============================================
# Application Configuration
# ============================================
spring.application.name=auth-backend
server.port=8080

# ============================================
# Database Configuration (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Abhijit@227
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

